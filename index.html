<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cave Dasher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
    }
    canvas {
      display: block;
      border-radius: 12px;
      cursor: pointer;
      /* Scale down on small screens */
      max-width: 100vw;
      max-height: 100vh;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 480, H = 580;
canvas.width = W;
canvas.height = H;

let bat, mountains, score, speed, frame, state;

const GAP = 220;
const BAT_X = 100;
const GRAVITY = 0.13;
const FLAP = -4.5;
const MTN_WIDTH = 70;

function initGame() {
  bat = { y: H / 2, vy: 0 };
  mountains = [];
  score = 0;
  speed = 1.6;
  frame = 0;
  state = 'start';
  spawnMountain(W + 50);
  spawnMountain(W + 50 + 280);
  spawnMountain(W + 50 + 560);
}

function spawnMountain(x) {
  const topH = 60 + Math.random() * (H - GAP - 120);
  mountains.push({ x, topH, passed: false });
}

function flap() {
  if (state === 'start') { state = 'play'; return; }
  if (state === 'play') bat.vy = FLAP;
  if (state === 'dead') initGame();
}

canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); flap(); }
});

function drawBg() {
  ctx.fillStyle = '#0d0d2b';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  [[40,50],[80,30],[130,80],[200,20],[300,60],[400,35],[450,90],[60,150],
   [370,110],[250,45],[180,130],[420,70],[350,140],[100,110],[470,40]].forEach(([sx,sy]) => {
    ctx.beginPath(); ctx.arc(sx, sy, 1, 0, Math.PI * 2); ctx.fill();
  });
  ctx.fillStyle = '#fffbe0';
  ctx.beginPath(); ctx.arc(400, 80, 38, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#0d0d2b';
  ctx.beginPath(); ctx.arc(415, 73, 34, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a1a3e';
  ctx.fillRect(0, H - 30, W, 30);
}

function drawMountain(x, topH) {
  const W2 = MTN_WIDTH;
  ctx.fillStyle = '#3b3460';
  ctx.fillRect(x, 0, W2, topH);
  ctx.beginPath();
  ctx.moveTo(x, topH);
  ctx.lineTo(x+W2/4, topH+35); ctx.lineTo(x+W2/2, topH+10);
  ctx.lineTo(x+W2*3/4, topH+42); ctx.lineTo(x+W2, topH+18);
  ctx.lineTo(x+W2, topH); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#a09ccc';
  ctx.beginPath();
  ctx.moveTo(x+W2*0.3,0); ctx.lineTo(x+W2*0.1,25); ctx.lineTo(x+W2*0.5,12);
  ctx.lineTo(x+W2*0.9,25); ctx.lineTo(x+W2*0.7,0); ctx.closePath(); ctx.fill();

  const botY = topH + GAP;
  ctx.fillStyle = '#3b3460';
  ctx.fillRect(x, botY, W2, H - botY);
  ctx.beginPath();
  ctx.moveTo(x, botY); ctx.lineTo(x+W2/5, botY-40); ctx.lineTo(x+W2*2/5, botY-15);
  ctx.lineTo(x+W2*3/5, botY-50); ctx.lineTo(x+W2*4/5, botY-22);
  ctx.lineTo(x+W2, botY-35); ctx.lineTo(x+W2, botY); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#a09ccc';
  ctx.beginPath();
  ctx.moveTo(x+W2*0.2,H); ctx.lineTo(x+W2*0.1,H-22); ctx.lineTo(x+W2*0.4,H-10);
  ctx.lineTo(x+W2*0.7,H-20); ctx.lineTo(x+W2*0.9,H); ctx.closePath(); ctx.fill();
}

function drawBat(y) {
  const bx = BAT_X, by = Math.round(y);
  const wf = state === 'start' ? 0.5 : Math.sin(frame * 0.25) * 0.5 + 0.5;
  ctx.save(); ctx.translate(bx, by);
  ctx.fillStyle = '#3a1a5e';
  ctx.beginPath(); ctx.ellipse(0, 0, 14, 10, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#5a2d8a';
  ctx.beginPath(); ctx.moveTo(-5,-2);
  ctx.quadraticCurveTo(-30,-20-wf*18,-42,4+wf*10);
  ctx.quadraticCurveTo(-28,8+wf*5,-5,5); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(5,-2);
  ctx.quadraticCurveTo(30,-20-wf*18,42,4+wf*10);
  ctx.quadraticCurveTo(28,8+wf*5,5,5); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#3a1a5e';
  ctx.beginPath(); ctx.moveTo(-6,-8); ctx.lineTo(-10,-18); ctx.lineTo(-2,-10); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(6,-8); ctx.lineTo(10,-18); ctx.lineTo(2,-10); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ff4444';
  ctx.beginPath(); ctx.arc(-4,-2,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4,-2,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-3.2,-2.5,1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4.8,-2.5,1,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function checkCollision() {
  const bx = BAT_X, by = bat.y, bR = 10;
  if (by - bR < 0 || by + bR > H - 30) return true;
  for (const m of mountains) {
    if (bx+bR > m.x+6 && bx-bR < m.x+MTN_WIDTH-6) {
      if (by-bR < m.topH+30 || by+bR > m.topH+GAP-25) return true;
    }
  }
  return false;
}

function drawHUD() {
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = 'bold 32px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(score, W / 2, 52);
}

let pulse = 0;
function drawStart() {
  pulse += 0.04;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(58,26,94,0.85)';
  ctx.beginPath();
  ctx.roundRect(W/2-160, H/2-130, 320, 240, 16);
  ctx.fill();
  ctx.strokeStyle = '#a09ccc';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.save();
  ctx.translate(W/2, H/2-90);
  ctx.fillStyle = '#5a2d8a';
  ctx.beginPath(); ctx.ellipse(0,0,10,7,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-4,-1);
  ctx.quadraticCurveTo(-20,-14,-30,3);
  ctx.quadraticCurveTo(-18,6,-4,4); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(4,-1);
  ctx.quadraticCurveTo(20,-14,30,3);
  ctx.quadraticCurveTo(18,6,4,4); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ff4444';
  ctx.beginPath(); ctx.arc(-3,-1,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3,-1,2,0,Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.fillStyle = '#e8e0ff';
  ctx.font = 'bold 34px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('CAVE DASHER', W/2, H/2-48);
  ctx.fillStyle = '#a09ccc';
  ctx.font = '14px sans-serif';
  ctx.fillText('dodge the mountain peaks!', W/2, H/2-22);
  ctx.strokeStyle = 'rgba(160,156,204,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W/2-100, H/2-8); ctx.lineTo(W/2+100, H/2-8); ctx.stroke();
  const alpha = 0.6 + Math.sin(pulse) * 0.4;
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  ctx.font = 'bold 17px sans-serif';
  ctx.fillText('click or tap to start', W/2, H/2+28);
  ctx.fillStyle = 'rgba(160,156,204,0.7)';
  ctx.font = '13px sans-serif';
  ctx.fillText('flap to stay airborne', W/2, H/2+58);
}

function drawDead() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#ff6b6b'; ctx.font = 'bold 38px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('YOU CRASHED!', W/2, H/2-60);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 28px sans-serif';
  ctx.fillText('Score: '+score, W/2, H/2-15);
  ctx.fillStyle = '#ccc'; ctx.font = '18px sans-serif';
  ctx.fillText('Click or tap to try again', W/2, H/2+30);
}

function loop() {
  frame++;
  drawBg();
  if (state === 'play') {
    bat.vy += GRAVITY;
    bat.y += bat.vy;
    if (frame % 500 === 0) speed = Math.min(speed + 0.2, 4);
    for (const m of mountains) m.x -= speed;
    const last = mountains[mountains.length - 1];
    if (last.x < W - 260) spawnMountain(W + 20);
    mountains = mountains.filter(m => m.x + MTN_WIDTH + 50 > 0);
    for (const m of mountains) {
      if (!m.passed && m.x + MTN_WIDTH < BAT_X) { m.passed = true; score++; }
    }
    if (checkCollision()) state = 'dead';
  }
  mountains.forEach(m => drawMountain(m.x, m.topH));
  drawBat(bat.y);
  if (state === 'play') drawHUD();
  if (state === 'start') drawStart();
  if (state === 'dead') drawDead();
  requestAnimationFrame(loop);
}

initGame();
loop();
</script>
</body>
</html>
